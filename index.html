<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#060d0a" />
    <!-- Apply the saved theme to <html> before first paint so mobile browsers
         render the correct colours (and address-bar / status-bar tint) with no
         flash, regardless of when React hydrates. -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem("goalpost-settings");
          var theme = raw && (JSON.parse(raw).state || {}).theme;
          if (theme !== "light" && theme !== "dark") theme = "dark";
          document.documentElement.setAttribute("data-theme", theme);
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute("content", theme === "light" ? "#f2f6f3" : "#060d0a");
        } catch (e) {}
      })();
    </script>
    <meta
      name="description"
      content="GoalPost — the ultimate football quiz arena. Battle rivals, climb leaderboards, conquer daily challenges and prove you're the greatest football brain on the planet."
    />
    <meta property="og:title" content="GoalPost — Football Quiz Arena" />
    <meta
      property="og:description"
      content="Battle rivals, climb leaderboards and prove your football knowledge across 24 categories."
    />
    <meta property="og:type" content="website" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%BD%3C/text%3E%3C/svg%3E" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@700&display=swap"
      rel="stylesheet"
    />
    <title>GoalPost — Football Quiz Arena</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
