# Netlify build configuration for GoalPost.
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback: serve index.html for unknown routes. Netlify serves real files
# (assets, sw.js, manifest) first, so this only catches client-side routes.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Never cache the service worker or the HTML shell, so redeploys ship instantly.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"
